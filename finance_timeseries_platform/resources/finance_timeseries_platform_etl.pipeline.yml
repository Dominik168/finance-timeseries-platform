# The main pipeline for finance_timeseries_platform

resources:
  pipelines:
    finance_timeseries_platform_etl:
      name: finance_timeseries_platform_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/finance_timeseries_platform_etl"

      libraries:
        - glob:
            include: ../src/finance_timeseries_platform_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
